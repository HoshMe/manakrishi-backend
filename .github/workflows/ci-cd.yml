name: ManaKrishi Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Test ───────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manakrishi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checks
        env:
          DB_NAME: manakrishi_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key
          DEBUG: True
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: ENV_PROD,FIREBASE_CREDENTIALS
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              sudo apt-get install -y docker-compose-plugin git
            fi

            # Setup app directory
            sudo mkdir -p /opt/manakrishi
            sudo chown $USER:$USER /opt/manakrishi
            cd /opt/manakrishi

            # Clone or pull
            if [ -d .git ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # Write env and firebase creds
            echo "${{ secrets.ENV_PROD }}" > .env.prod
            echo '${{ secrets.FIREBASE_CREDENTIALS }}' > firebase-credentials.json

            # Deploy
            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up --build -d

            # Wait and migrate
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput

            # Cleanup
            docker image prune -f
            echo "✅ Deployed"

      - name: Health check
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.LIGHTSAIL_HOST }}:8000/health/ || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "⚠️ Health check returned $HTTP_CODE"
          fi

  # ─── Deploy Staging ────────────────────────────────────────────────────────
  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/manakrishi-staging
            sudo chown $USER:$USER /opt/manakrishi-staging
            cd /opt/manakrishi-staging

            if [ -d .git ]; then
              git fetch origin develop
              git reset --hard origin/develop
            else
              git clone -b develop https://github.com/${{ github.repository }}.git .
            fi

            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up --build -d
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            docker image prune -f
            echo "✅ Staging deployed"
