name: ManaKrishi Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Test ───────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manakrishi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checks
        env:
          DB_NAME: manakrishi_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key
          DEBUG: True
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: ENV_PROD,FIREBASE_CREDENTIALS
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            # Install Docker Compose plugin if not present
            if ! sudo docker compose version &> /dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y docker-compose-plugin git
            fi

            # Setup app directory
            sudo mkdir -p /opt/manakrishi
            sudo chown $USER:$USER /opt/manakrishi
            cd /opt/manakrishi

            # Clone or pull
            if [ -d .git ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # Write env and firebase creds
            echo "${{ secrets.ENV_PROD }}" > .env.prod
            echo '${{ secrets.FIREBASE_CREDENTIALS }}' > firebase-credentials.json

            # Deploy
            sudo docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            sudo docker compose -f docker-compose.prod.yml up --build -d

            # Wait and migrate
            sleep 15
            sudo docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput

            # Cleanup
            sudo docker image prune -f

            # Auto-generate SSL if not exists and domain is set
            DOMAIN="${{ secrets.DOMAIN }}"
            if [ -n "$DOMAIN" ]; then
              # Check if cert already exists
              CERT_EXISTS=$(sudo docker volume inspect manakrishi_certbot_certs > /dev/null 2>&1 && sudo docker run --rm -v manakrishi_certbot_certs:/certs alpine sh -c "test -f /certs/live/$DOMAIN/fullchain.pem && echo yes || echo no" 2>/dev/null || echo "no")
              if [ "$CERT_EXISTS" = "no" ]; then
                echo "Generating SSL cert for $DOMAIN..."
                sudo docker compose -f docker-compose.prod.yml stop nginx 2>/dev/null || true
                sleep 2
                sudo docker run --rm \
                  -v manakrishi_certbot_certs:/etc/letsencrypt \
                  -p 80:80 \
                  certbot/certbot certonly --standalone \
                  --email admin@$DOMAIN --agree-tos --no-eff-email \
                  --non-interactive -d $DOMAIN && CERT_EXISTS="yes" || echo "SSL generation failed"
              fi
              # Always apply SSL config if cert exists
              if [ "$CERT_EXISTS" = "yes" ]; then
                echo "Enabling HTTPS for $DOMAIN..."
                cd /opt/manakrishi
                sed "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" docker/nginx-ssl.conf > docker/nginx.conf
                sudo docker compose -f docker-compose.prod.yml up -d nginx
              fi
            fi

            echo "✅ Deployed"

      - name: Health check
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: api.manakrishi.in" http://${{ secrets.LIGHTSAIL_HOST }}/health/ || echo "000")
          echo "Health check returned: $HTTP_CODE"

  # ─── Deploy Staging ────────────────────────────────────────────────────────
  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/manakrishi-staging
            sudo chown $USER:$USER /opt/manakrishi-staging
            cd /opt/manakrishi-staging

            if [ -d .git ]; then
              git fetch origin develop
              git reset --hard origin/develop
            else
              git clone -b develop https://github.com/${{ github.repository }}.git .
            fi

            sudo docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            sudo docker compose -f docker-compose.prod.yml up --build -d
            sleep 15
            sudo docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            sudo docker image prune -f
            echo "✅ Staging deployed"
