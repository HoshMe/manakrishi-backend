
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    depends_on:
      - redis
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_prod:/data
    deploy:
      resources:
        limits:
          memory: 512M

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker -l warning --concurrency=2
    env_file:
      - .env.prod
    depends_on:
      - redis
      - web
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.prod
    depends_on:
      - redis
      - web
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: always

volumes:
  redis_prod:
